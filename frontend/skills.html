    <button class="nav-item" onclick="goToPage('procedures.html')">Procedures</button>

    <button class="nav-item" onclick="goToPage('assessments.html')">Assessments</button>

  <main class="main-area">
    <header class="topbar">
      <div><h1>Skills</h1><p>Define and manage skill targets for behavior plans</p></div>
      <div class="top-actions">
        <button class="add-btn" onclick="openModal('addSkillModal')">+ Add Skill</button>
        <div class="user-pill">—</div>
      </div>
    </header>

    <div class="table-wrapper">
      <div class="table-toolbar">
        <div class="table-search">
          <input class="search-input" id="skillSearch" type="text" placeholder="Search skills..." oninput="filterTable('skillSearch','skillsBody')"/>
        </div>
      </div>
      <table class="data-table" id="skillsTable">
        <thead>
          <tr>
            <th>Skill Name</th>
            <th>Category</th>
            <th>Objective</th>
            <th>Client</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="skillsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Add Skill Modal -->
<div class="modal-overlay" id="addSkillModal" onclick="if(event.target===this)closeModal('addSkillModal')">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Add Skill</h3>
      <button class="modal-close" onclick="closeModal('addSkillModal')">x</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Skill Name</label>
        <input type="text" placeholder="Enter skill name"/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select>
          <option>Communication</option>
          <option>Compliance</option>
          <option>Social Skills</option>
          <option>Self-Care</option>
          <option>Adaptive</option>
          <option>Academic</option>
        </select>
      </div>
      <div class="form-group">
        <label>Objective</label>
        <textarea rows="3" placeholder="Describe the skill objective..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Client</label>
          <select>
            <option>Jon Snow</option>
            <option>Robb Stark</option>
            <option>Arya Stark</option>
            <option>Sansa Stark</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select>
            <option>Active</option>
            <option>Pending</option>
            <option>Draft</option>
            <option>Inactive</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="small-btn" onclick="closeModal('addSkillModal')">Cancel</button>
      <button class="add-btn" onclick="addSkillFromModal()">Save Skill</button>
    </div>
  </div>
</div>

<!-- Edit Skill Modal -->
<div class="modal-overlay" id="editSkillModal" onclick="if(event.target===this)closeModal('editSkillModal')">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Edit Skill</h3>
      <button class="modal-close" onclick="closeModal('editSkillModal')">x</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Skill Name</label>
        <input type="text" id="editSkillName"/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="editSkillCategory">
          <option>Communication</option>
          <option>Compliance</option>
          <option>Social Skills</option>
          <option>Self-Care</option>
          <option>Adaptive</option>
          <option>Academic</option>
        </select>
      </div>
      <div class="form-group">
        <label>Objective</label>
        <textarea rows="3" id="editSkillObjective"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Client</label>
          <select id="editSkillClient">
            <option>Jon Snow</option>
            <option>Robb Stark</option>
            <option>Arya Stark</option>
            <option>Sansa Stark</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editSkillStatus">
            <option>Active</option>
            <option>Pending</option>
            <option>Draft</option>
            <option>Inactive</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="small-btn" onclick="closeModal('editSkillModal')">Cancel</button>
      <button class="add-btn" onclick="saveForm('editSkillModal')">Save Changes</button>
    </div>
  </div>
</div>

<!-- View Skill Modal -->
<div class="modal-overlay" id="viewSkillModal" onclick="if(event.target===this)closeModal('viewSkillModal')">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Skill Details</h3>
      <button class="modal-close" onclick="closeModal('viewSkillModal')">x</button>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        <div class="info-item"><span>Skill Name</span><strong id="vs-name"></strong></div>
        <div class="info-item"><span>Category</span><strong id="vs-category"></strong></div>
        <div class="info-item"><span>Client</span><strong id="vs-client"></strong></div>
        <div class="info-item"><span>Status</span><strong id="vs-status"></strong></div>
        <div class="info-item" style="grid-column:1/-1"><span>Objective</span><strong id="vs-objective"></strong></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="add-btn" onclick="closeModal('viewSkillModal')">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseConfig.js"></script>
<script src="supabaseClient.js"></script>
<script src="jvmSupabaseBridge.js"></script>
<script src="dashboard.js"></script>
<script>
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
let skillsRows = [];
function scopedSkillsKey() {
  const orgId = window.gilbertoCurrentOrg && window.gilbertoCurrentOrg.id ? window.gilbertoCurrentOrg.id : 'no-org';
  return 'gilberto_skills:' + orgId;
}
function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#2d4a3e;color:white;padding:12px 20px;border-radius:6px;font-size:13px;z-index:999;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
function saveSkills() { localStorage.setItem(scopedSkillsKey(), JSON.stringify(skillsRows)); }
function loadSkills() {
  try { skillsRows = JSON.parse(localStorage.getItem(scopedSkillsKey()) || '[]'); } catch (_) { skillsRows = []; }
}
function esc(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;"); }
function renderSkills() {
  const body = document.getElementById('skillsBody');
  if (!skillsRows.length) {
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:16px;color:#6b8c7a;">No skills yet. Click <strong>+ Add Skill</strong> to get started.</td></tr>';
    return;
  }
  body.innerHTML = skillsRows.map((r,i)=>'<tr><td>'+esc(r.name)+'</td><td>'+esc(r.category)+'</td><td>'+esc(r.objective)+'</td><td>'+esc(r.client)+'</td><td><span class="badge badge-'+(String(r.status).toLowerCase())+'">'+esc(r.status)+'</span></td><td><button class="tbl-btn" onclick="openViewSkill('+JSON.stringify(r.name)+','+JSON.stringify(r.category)+','+JSON.stringify(r.objective)+','+JSON.stringify(r.client)+','+JSON.stringify(r.status)+')">View</button><button class="tbl-btn danger" onclick="deleteSkill('+i+')">Delete</button></td></tr>').join('');
}
function deleteSkill(i){ skillsRows.splice(i,1); saveSkills(); renderSkills(); toast('Skill deleted'); }
function addSkillFromModal() {
  const m = document.getElementById('addSkillModal');
  const inputs = m.querySelectorAll('input, select, textarea');
  const row = { name: inputs[0].value.trim(), category: inputs[1].value, objective: inputs[2].value.trim(), client: inputs[3].value, status: inputs[4].value };
  if (!row.name) { toast('Skill name is required'); return; }
  skillsRows.unshift(row); saveSkills(); renderSkills(); closeModal('addSkillModal'); m.querySelectorAll('input,textarea').forEach(el=>el.value=''); toast('Skill saved');
}
function filterTable(inputId, tbodyId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  document.querySelectorAll('#' + tbodyId + ' tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function openViewSkill(name, category, objective, client, status) {
  document.getElementById('vs-name').textContent = name;
  document.getElementById('vs-category').textContent = category;
  document.getElementById('vs-objective').textContent = objective;
  document.getElementById('vs-client').textContent = client;
  document.getElementById('vs-status').textContent = status;
  openModal('viewSkillModal');
}
document.addEventListener('DOMContentLoaded', async function(){
  if (typeof loadGilbertoOrganization === 'function') await loadGilbertoOrganization();
  loadSkills();
  renderSkills();
});
</script>
</body>
