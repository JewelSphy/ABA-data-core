<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff - Gilberto CRM</title>

    .ui-colorful .topbar h1 { background: linear-gradient(90deg, #1d6fd8, #1f9e67); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .ui-colorful .table-wrapper { border: 1px solid #dbe7e2; border-radius: 14px; box-shadow: 0 12px 26px rgba(22,61,48,.08); background: linear-gradient(180deg, #fff, #fbfffd); }
    .ui-colorful .data-table thead th { background: linear-gradient(90deg, #eef7ff, #effbf4); color: #22493b; border-bottom: 1px solid #d9e9df; }
    .ui-colorful .data-table tbody tr:hover { background: linear-gradient(90deg, rgba(66,133,244,.08), rgba(46,204,113,.08)); }
    .ui-colorful .add-btn { background: linear-gradient(90deg, #2b73d2, #2ca66b); border: none; box-shadow: 0 10px 20px rgba(35,93,155,.2); }
    .ui-colorful .add-btn:hover { background: linear-gradient(90deg, #225da8, #248558); transform: translateY(-1px); }
  </style>
</head>

<div class="app-layout">

    <div class="sidebar-header">
      <div class="logo-icon">G</div>
      <div><h2>Gilberto</h2><p>ABA Care CRM</p></div>
    </div>
    <button class="nav-item" onclick="goToPage('dashboard.html')">Dashboard</button>
    <button class="nav-item" onclick="goToPage('calendar.html')">Calendar</button>
    <button class="nav-item" onclick="goToPage('sessions.html')">Sessions</button>
    <button class="nav-item" onclick="goToPage('session-notes.html')">Session Notes</button>
    <button class="nav-item" onclick="goToPage('revisions.html')">Revisions</button>
    <button class="nav-item" onclick="goToPage('caregiver-signatures.html')">Caregiver Signatures</button>
    <p class="section-title">People</p>
    <button class="nav-item" onclick="goToPage('clients.html')">Clients</button>
    <button class="nav-item active" onclick="goToPage('staff.html')">Staff</button>
    <button class="nav-item" onclick="goToPage('caregivers.html')">Caregivers</button>
    <button class="nav-item" onclick="goToPage('providers.html')">Providers</button>
    <button class="nav-item" onclick="goToPage('authorizations.html')">Authorizations</button>
    <button class="nav-item" onclick="goToPage('documents.html')">Documents</button>
    <p class="section-title">Behavior Plans</p>
    <button class="nav-item" onclick="goToPage('skills.html')">Skills</button>
    <button class="nav-item" onclick="goToPage('behaviors.html')">Behaviors</button>
    <button class="nav-item" onclick="goToPage('replacement-behaviors.html')">Replacement Behaviors</button>
    <button class="nav-item" onclick="goToPage('interventions.html')">Interventions</button>
    <button class="nav-item" onclick="goToPage('objectives.html')">Objectives</button>
    <button class="nav-item" onclick="goToPage('definitions.html')">Definitions</button>
    <button class="nav-item" onclick="goToPage('barriers.html')">Barriers</button>
    <button class="nav-item" onclick="goToPage('procedures.html')">Procedures</button>
    <p class="section-title">Reports</p>
    <button class="nav-item" onclick="goToPage('assessments.html')">Assessments</button>
    <button class="nav-item" onclick="goToPage('monthly-reports.html')">Monthly Reports</button>
    <button class="nav-item" onclick="goToPage('custom-reports.html')">Custom Reports</button>
    <button class="nav-item" onclick="goToPage('service-reports.html')">Service Reports</button>
    <button class="nav-item" onclick="goToPage('supervision-logs.html')">Supervision Logs</button>
    <p class="section-title">Data</p>
    <button class="nav-item" onclick="goToPage('library.html')">Library</button>
    <button class="nav-item" onclick="goToPage('graph-hub.html')">Graph Hub</button>
    <button class="nav-item" onclick="goToPage('data-collection-hub.html')">Data Collection Hub</button>
    <button class="nav-item" onclick="goToPage('stos-ltos.html')">STOs / LTOs</button>
    <button class="nav-item" onclick="goToPage('behavioral-analytics.html')">Behavioral Analytics</button>
    <button class="nav-item logout" onclick="logout()">Log Out</button>
  </aside>

  <main class="main-area">
    <header class="topbar">
      <div>
        <h1>Staff</h1>
        <p>Manage RBTs, BCBAs, and other staff members</p>
      </div>
      <div class="top-actions">
        <button class="add-btn" onclick="openAddStaff()">+ Add Staff</button>
        <div class="user-pill" id="topbarUserPill">—</div>
      </div>
    </header>

    <div class="table-wrapper">
      <div class="table-toolbar">
        <div class="table-search">
          <input class="search-input" id="staffSearch" type="text" placeholder="Search staff…" oninput="filterStaff()"/>
        </div>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="staffBody">
          <tr><td colspan="6" style="text-align:center;padding:32px;color:#9eb3a8;">Loading staff…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── Add Staff Modal ────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="addStaffModal" onclick="if(event.target===this)closeModal('addStaffModal')">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Add Staff Member</h3>
      <button class="modal-close" onclick="closeModal('addStaffModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" id="addStaffFirstName" placeholder="First name"/>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" id="addStaffLastName" placeholder="Last name"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="addStaffRole">
            <option value="">— Select role —</option>
            <option value="rbt">RBT</option>
            <option value="bcba">BCBA</option>
            <option value="supervisor">Supervisor</option>
            <option value="admin">Admin</option>
            <option value="caregiver">Caregiver</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="addStaffStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="on_leave">On Leave</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="addStaffEmail" placeholder="staff@email.com"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="addStaffPhone" placeholder="(555) 000-0000"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="small-btn" onclick="closeModal('addStaffModal')">Cancel</button>
      <button class="add-btn" id="addStaffSaveBtn" onclick="createStaff()">Save Staff</button>
    </div>
  </div>
</div>

<!-- ── Edit Staff Modal ───────────────────────────────────────────────────── -->
<div class="modal-overlay" id="editStaffModal" onclick="if(event.target===this)closeModal('editStaffModal')">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Edit Staff Member</h3>
      <button class="modal-close" onclick="closeModal('editStaffModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" id="editStaffFirstName"/>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" id="editStaffLastName"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="editStaffRole">
            <option value="">— Select role —</option>
            <option value="rbt">RBT</option>
            <option value="bcba">BCBA</option>
            <option value="supervisor">Supervisor</option>
            <option value="admin">Admin</option>
            <option value="caregiver">Caregiver</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editStaffStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="on_leave">On Leave</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editStaffEmail"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="editStaffPhone"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="small-btn" onclick="closeModal('editStaffModal')">Cancel</button>
      <button class="add-btn" id="editStaffSaveBtn" onclick="updateStaff()">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseConfig.js"></script>
<script src="supabaseClient.js"></script>
<script src="jvmSupabaseBridge.js"></script>
<script src="dashboard.js"></script>
<script>

// ── State ─────────────────────────────────────────────────────────────────────
var _staffData      = [];
var _editingStaffId = null;

function openModal  (id) { document.getElementById (id).classList.add    ('open'); }
function closeModal (id) { document.getElementById (id).classList.remove ('open'); }

function staffToast (msg) {
  var t = document.createElement ('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#2d4a3e;color:#fff;'
    + 'padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;'
    + 'box-shadow:0 4px 14px rgba(0,0,0,.18);';
  t.textContent = msg;
  document.body.appendChild (t);
  setTimeout (function () { t.remove (); }, 2800);
}

function esc (s) {
  if (s == null || s === '') return '—';
  return String (s).replace (/&/g, '&amp;').replace (/</g, '&lt;').replace (/>/g, '&gt;').replace (/"/g, '&quot;');
}

// ── Load + render ─────────────────────────────────────────────────────────────
async function loadStaffTable () {
  var org = window.gilbertoCurrentOrg;
  if (!org || !org.id) return;

  try {
    var rows;
    if (typeof jvmSupabaseRelayEnabled === 'function' && jvmSupabaseRelayEnabled ()) {
      var res = await jvmFetchStaff (org.id);
      if (!res.ok) throw new Error (await res.text ());
      rows = await res.json ();
    } else {
      var q = await window.supabaseClient
        .from ('staff')
        .select ('id,first_name,last_name,role,email,phone,status')
        .eq ('org_id', org.id)
        .order ('last_name', { ascending: true });
      if (q.error) throw q.error;
      rows = q.data || [];
    }
    _staffData = rows;
    renderStaffTable (rows);
  } catch (e) {
    console.warn ('loadStaffTable error:', e);
    document.getElementById ('staffBody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:24px;color:#c0392b;">Failed to load staff: ' + esc (e.message) + '</td></tr>';
  }
}

function renderStaffTable (rows) {
  var tbody = document.getElementById ('staffBody');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#9eb3a8;">'
      + 'No staff yet. Click <strong>+ Add Staff</strong> to get started.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map (function (s) {
    var statusBadge = s.status === 'active'
      ? '<span class="badge badge-active">Active</span>'
      : s.status === 'on_leave'
        ? '<span class="badge badge-expiring">On Leave</span>'
        : '<span class="badge badge-pending">Inactive</span>';
    return '<tr>'
      + '<td>' + esc (s.first_name + ' ' + s.last_name) + '</td>'
      + '<td>' + esc (s.role) + '</td>'
      + '<td>' + esc (s.email) + '</td>'
      + '<td>' + esc (s.phone) + '</td>'
      + '<td>' + statusBadge + '</td>'
      + '<td><button class="tbl-btn" onclick="openEditStaff(\'' + s.id + '\')">Edit</button></td>'
      + '</tr>';
  }).join ('');
}

function filterStaff () {
  var q = (document.getElementById ('staffSearch').value || '').toLowerCase ();
  var filtered = q
    ? _staffData.filter (function (s) {
        return (s.first_name + ' ' + s.last_name + ' ' + (s.role || '')).toLowerCase ().includes (q);
      })
    : _staffData;
  renderStaffTable (filtered);
}

// ── Add ───────────────────────────────────────────────────────────────────────
function openAddStaff () {
  ['addStaffFirstName','addStaffLastName','addStaffEmail','addStaffPhone'].forEach (function (id) {
    var el = document.getElementById (id); if (el) el.value = '';
  });
  var r = document.getElementById ('addStaffRole');   if (r) r.value = '';
  var s = document.getElementById ('addStaffStatus'); if (s) s.value = 'active';
  openModal ('addStaffModal');
}

async function createStaff () {
  var org = window.gilbertoCurrentOrg;
  if (!org || !org.id) { staffToast ('Organization not loaded.'); return; }

  var row = buildStaffInsertRow ({
    first_name: (document.getElementById ('addStaffFirstName').value || '').trim (),
    last_name:  (document.getElementById ('addStaffLastName').value  || '').trim (),
    role:       document.getElementById ('addStaffRole').value       || null,
    email:      (document.getElementById ('addStaffEmail').value     || '').trim (),
    phone:      (document.getElementById ('addStaffPhone').value     || '').trim (),
    status:     document.getElementById ('addStaffStatus').value     || 'active',
  }, org.id);

  if (!row.first_name || !row.last_name) { staffToast ('First and last name are required.'); return; }

  var btn = document.getElementById ('addStaffSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    if (typeof jvmSupabaseRelayEnabled === 'function' && jvmSupabaseRelayEnabled ()) {
      var res = await staffJvmCreate (row);
      if (!res.ok) { staffToast ('Save failed: ' + await readJvmErrorResponse (res)); return; }
    } else {
      var r = await window.supabaseClient.from ('staff').insert (row);
      if (r.error) { staffToast ('Save failed: ' + r.error.message); return; }
    }
    closeModal ('addStaffModal');
    staffToast ('Staff member added');
    await loadStaffTable ();
  } catch (err) {
    staffToast ('Save failed: ' + (err && err.message ? err.message : 'unknown error'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Save Staff'; }
  }
}

// ── Edit ──────────────────────────────────────────────────────────────────────
function openEditStaff (staffId) {
  var s = _staffData.find (function (x) { return x.id === staffId; });
  if (!s) return;
  _editingStaffId = staffId;

  var set = function (id, val) { var el = document.getElementById (id); if (el) el.value = val || ''; };
  set ('editStaffFirstName', s.first_name);
  set ('editStaffLastName',  s.last_name);
  set ('editStaffEmail',     s.email);
  set ('editStaffPhone',     s.phone);

  var role   = document.getElementById ('editStaffRole');   if (role)   role.value   = s.role   || '';
  var status = document.getElementById ('editStaffStatus'); if (status) status.value = s.status || 'active';

  openModal ('editStaffModal');
}

async function updateStaff () {
  if (!_editingStaffId) return;

  var patch = {
    first_name: (document.getElementById ('editStaffFirstName').value || '').trim (),
    last_name:  (document.getElementById ('editStaffLastName').value  || '').trim (),
    role:       document.getElementById ('editStaffRole').value       || null,
    email:      (document.getElementById ('editStaffEmail').value     || '').trim (),
    phone:      (document.getElementById ('editStaffPhone').value     || '').trim (),
    status:     document.getElementById ('editStaffStatus').value     || 'active',
  };

  if (!patch.first_name || !patch.last_name) { staffToast ('First and last name are required.'); return; }

  var btn = document.getElementById ('editStaffSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    if (typeof jvmSupabaseRelayEnabled === 'function' && jvmSupabaseRelayEnabled ()) {
      var res = await staffJvmPatch (_editingStaffId, patch);
      if (!res.ok) { staffToast ('Update failed: ' + await readJvmErrorResponse (res)); return; }
    } else {
      var r = await window.supabaseClient.from ('staff').update (patch).eq ('id', _editingStaffId);
      if (r.error) { staffToast ('Update failed: ' + r.error.message); return; }
    }
    closeModal ('editStaffModal');
    staffToast ('Staff member updated');
    await loadStaffTable ();
  } catch (err) {
    staffToast ('Update failed: ' + (err && err.message ? err.message : 'unknown error'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Save Changes'; }
  }
}

window.loadStaffTable = loadStaffTable;

</script>
</body>
</html>
